name: Build and Deploy

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Main Branch
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Generate Possible Types
        run: npm run generate

      - name: Build Website
        run: npm run build

      - name: Install SSH Key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.SSH_KEY }}
          known_hosts: ${{ secrets.KNOWN_HOSTS }}

      - name: Show SSH Fingerprint
        run: ssh-keygen -lf ~/.ssh/id_rsa

      - name: Test SSH
        run: ssh -i ~/.ssh/id_rsa ${{ secrets.USERNAME }}@${{ secrets.HOST }} "whoami"

      - name: Deploy with rsync
        run: >-
          rsync -avz --delete
          --exclude '.git'
          --exclude '.github'
          --exclude 'node_modules'
          --exclude '.next'
          --exclude '.env'
          --exclude '.env.*'
          -e "ssh -i ~/.ssh/id_rsa"
          .
          ${{ secrets.USERNAME }}@${{ secrets.HOST }}:${{ secrets.TARGET_DIRECTORY }}

      - name: Restart PM2 Process
        run: ssh -i ~/.ssh/id_rsa ${{ secrets.USERNAME }}@${{ secrets.HOST }} "pm2 restart @destinasian-id-frontend"
